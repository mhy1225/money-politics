<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 閃耀金權：政治獻金大解密 💰</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 頂部俗氣導覽列 -->
    <header class="tacky-header">
        <h1>💎 閃耀金權 💎 <br><small>政治獻金查詢中心</small></h1>
    </header>

    <!-- ================= 專題首頁 (Landing Page) ================= -->
    <main id="landing-page" class="page-section active">
        
        <!-- Hero 敘事 -->
        <section class="hero-section">
            <h2>權力的價格，到底有多昂貴？</h2>
            <p>在這裡，每一分錢都會發光！揭開政商名流的黃金寶庫，看看是誰在用新台幣下架誰！</p>
        </section>

        <!-- 搜尋入口 (最重要 CTA) -->
        <section class="search-section">
            <div class="search-box">
                <input type="text" id="main-search" placeholder="輸入政客大名...">
                <button id="search-btn" class="bling-btn">💰 立即搜刮 💰</button>
            </div>
        </section>
        
        <!-- (已移除：試試手氣 與 編輯精選區塊) -->

    </main>

    <!-- ================= 結果列表頁 (Results List) ================= -->
    <main id="results-page" class="page-section">
        
        <button id="back-btn" class="bling-btn small">🔙 返回金庫大門</button>
        
        <!-- Quick Summary -->
        <section class="quick-summary">
            <h2>搜尋結果：<span id="search-term-display" class="gold-text"></span></h2>
            <div class="summary-stats">
                <div class="stat-box">總金流：<span id="total-amount" class="bling-number">NT$ 0</span></div>
                <div class="stat-box">總筆數：<span id="total-count" class="bling-number">0</span> 筆</div>
            </div>
        </section>

        <!-- 排序 -->
        <section class="controls-section">
            <label for="sort-select">財富排序：</label>
            <select id="sort-select" class="tacky-select">
                <option value="amount-desc">💸 金額最高到最低</option>
                <option value="amount-asc">🪙 金額最低到最高</option>
                <option value="date-new">📅 最新進帳</option>
            </select>
        </section>

        <!-- 列表 (用來裝真實資料的空盒子) -->
        <section class="results-list" id="results-container">
            <!-- 這裡面的內容會由 JavaScript 動態產生 -->
        </section>

        <!-- 分頁 / Infinite Scroll 提示 -->
        <section class="pagination">
            <button class="bling-btn small">載入更多黃金紀錄...</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
